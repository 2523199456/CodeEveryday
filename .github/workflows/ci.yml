name: ci

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 20 * * *'

jobs:
  autogreen:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Auto green
        run: |
          git config --local user.email "2523199456@qq.com"
          git config --local user.name "2523199456"
          git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git pull --rebase
          git commit --allow-empty -m "code everyday"
          git push
